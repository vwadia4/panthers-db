<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panthers Rugby - Player Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo {
            max-width: 120px;
            height: auto;
            border-radius: 10px;
            background: white;
            padding: 10px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .form-container {
            padding: 40px 30px;
        }

        .section-title {
            color: #2a5298;
            font-size: 1.5em;
            margin: 30px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .section-title:first-child {
            margin-top: 0;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        label .required {
            color: #e74c3c;
            margin-left: 3px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #28a745;
            display: none;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
            display: none;
        }

        .admin-link {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .admin-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .admin-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }

            .form-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <!-- Replace 'logo.png' with your actual logo file name -->
                <img src="logo.png" alt="Panthers Rugby Logo" class="logo" id="logoImage">
            </div>
            <h1>🏉 Panthers Rugby</h1>
            <p>Player Registration Form</p>
        </div>

        <div class="form-container">
            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <form id="registrationForm">
                <h2 class="section-title">Personal Information</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="fullName">Full Name <span class="required">*</span></label>
                        <input type="text" id="fullName" name="fullName" required>
                    </div>
                    <div class="form-group">
                        <label for="dateOfBirth">Date of Birth <span class="required">*</span></label>
                        <input type="date" id="dateOfBirth" name="dateOfBirth" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dateJoined">Date Joined <span class="required">*</span></label>
                        <input type="date" id="dateJoined" name="dateJoined" required>
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number <span class="required">*</span></label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="+256..." required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="identificationNumber">Identification Number <span class="required">*</span></label>
                        <input type="text" id="identificationNumber" name="identificationNumber" placeholder="National ID or Passport Number" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address <span class="required">*</span></label>
                        <input type="email" id="email" name="email" required>
                    </div>
                </div>

                <h2 class="section-title">Physical Information</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="height">Height (cm) <span class="required">*</span></label>
                        <input type="number" id="height" name="height" min="100" max="250" required>
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg) <span class="required">*</span></label>
                        <input type="number" id="weight" name="weight" min="30" max="200" required>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label for="medical">Medical History</label>
                    <textarea id="medicalHistory" name="medicalHistory" placeholder="List any previous injuries or medical conditions..."></textarea>
                </div>

                <h2 class="section-title">Location Information</h2>
                
                <div class="form-group">
                    <label for="locationAddress">Current Address <span class="required">*</span></label>
                    <textarea id="locationAddress" name="locationAddress" rows="3" required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="residence">Residence <span class="required">*</span></label>
                        <input type="text" id="residence" name="residence" placeholder="City/Town" required>
                    </div>
                    <div class="form-group">
                        <label for="occupation">Occupation <span class="required">*</span></label>
                        <input type="text" id="occupation" name="occupation" required>
                    </div>
                </div>

                <h2 class="section-title">Emergency Contact</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="nextOfKinName">Next of Kin Name <span class="required">*</span></label>
                        <input type="text" id="nextOfKinName" name="nextOfKinName" required>
                    </div>
                    <div class="form-group">
                        <label for="nextOfKinPhone">Next of Kin Phone <span class="required">*</span></label>
                        <input type="tel" id="nextOfKinPhone" name="nextOfKinPhone" placeholder="+256..." required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="nextOfKinRelationship">Relationship <span class="required">*</span></label>
                    <input type="text" id="nextOfKinRelationship" name="nextOfKinRelationship" placeholder="e.g., Father, Mother, Spouse, Sibling" required>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Register Player</button>
            </form>
        </div>

        <div class="admin-link">
            <p>Are you an administrator? <a href="/login">Login here</a></p>
        </div>
    </div>

    <script>
        // Handle logo image error
        document.getElementById('logoImage').onerror = function() {
            this.style.display = 'none';
        };

        // Set default date joined to today
        document.getElementById('dateJoined').valueAsDate = new Date();

        // Form submission
        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            
            // Hide previous messages
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';
            
            try {
                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);
                
                const response = await fetch('/register-player', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    successMsg.textContent = result.message;
                    successMsg.style.display = 'block';
                    e.target.reset();
                    document.getElementById('dateJoined').valueAsDate = new Date();
                    
                    // Scroll to top to show message
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    errorMsg.textContent = result.message;
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register Player';
            }
        });
    </script>
</body>
</html>
